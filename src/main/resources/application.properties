spring.application.name=urp

# DB connection — credentials MUST come from the environment in production.
# No fallbacks are configured here: a missing DB_USERNAME / DB_PASSWORD will
# cause the application to fail fast at startup rather than silently connect
# with a known-bad default (the value `smartbiomed/smartbiomed` previously
# appeared in this file and was committed to git history — see
# IMPL_SPEC §8.10 carry-over). Local development should activate the `dev`
# Spring profile, which sources the legacy defaults from
# `application-dev.properties` for backwards compatibility.
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect

# Wire-contract guard: ISO-8601 string serialization for LocalDateTime
# (locked by ReadApiContractTest.startTimeIsIso8601String).
spring.jackson.serialization.write-dates-as-timestamps=false

# SQL logging is off by default to keep PII out of stdout. Re-enable per deploy
# behind a profile (e.g., application-dev.properties) when actually debugging.
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Suppress message / stack-trace / exception leakage in error responses.
# The frontend http.ts also defends against verbatim message display; these
# server-side flags are belt-and-braces against accidental leakage from any
# uncaught error path. The GlobalExceptionHandler (Phase 7 T31) is the
# primary defense for known/expected exceptions.
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-binding-errors=never
server.error.include-exception=false

# CORS — comma-separated list of allowed origins for the SPA. Empty by
# default; `dev` profile sets it to a permissive localhost list for the
# Vite dev server. Production deployments MUST set CORS_ALLOWED_ORIGINS to
# the actual web origin(s) or the API will reject browser requests.
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:}
