spring.application.name=urp

# DB connection — credentials sourced from environment to keep secrets out of git.
# Defaults preserve the legacy dev DB so the existing local setup keeps working,
# but the documented baseline values must be rotated in any real deployment.
spring.datasource.url=${DB_URL:jdbc:mariadb://localhost:3306/patientinfo?useSSL=false&serverTimezone=Asia/Seoul}
spring.datasource.username=${DB_USERNAME:smartbiomed}
spring.datasource.password=${DB_PASSWORD:smartbiomed}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect

# Wire-contract guard: ISO-8601 string serialization for LocalDateTime
# (locked by ReadApiContractTest.startTimeIsIso8601String).
spring.jackson.serialization.write-dates-as-timestamps=false

# SQL logging is off by default to keep PII out of stdout. Re-enable per deploy
# behind a profile (e.g., application-dev.properties) when actually debugging.
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Suppress message / stack-trace / exception leakage in error responses.
# The frontend http.ts also defends against verbatim message display; these
# server-side flags are belt-and-braces.
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-binding-errors=never
server.error.include-exception=false