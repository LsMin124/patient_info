# Dev profile (-Dspring.profiles.active=dev or SPRING_PROFILES_ACTIVE=dev).
# Backwards-compatibility shim that restores the legacy local-development
# defaults that used to live in application.properties before Phase 7 T30.
# These values match the existing `smartbiomed/smartbiomed` MariaDB instance
# created by the original setup script — do NOT use in any non-local
# deployment.
#
# Rotation note: the legacy credential is leaked in this repo's git history
# (committed to the initial revision before Phase 2 externalization). Any
# real deployment MUST run with a freshly rotated credential supplied via
# DB_USERNAME / DB_PASSWORD environment variables.

spring.datasource.url=${DB_URL:jdbc:mariadb://localhost:3306/patientinfo?useSSL=false&serverTimezone=Asia/Seoul}
spring.datasource.username=${DB_USERNAME:smartbiomed}
spring.datasource.password=${DB_PASSWORD:smartbiomed}

# Permissive CORS for the Vite dev server. Production reads the value from
# the env-var-driven base file instead.
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
