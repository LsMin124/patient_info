# Test profile — h2 in-memory database, MySQL compatibility mode for MariaDB parity
spring.datasource.url=jdbc:h2:mem:test;MODE=MySQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# Lock the wire contract: dates serialize as ISO-8601 strings, never numeric timestamps.
spring.jackson.serialization.write-dates-as-timestamps=false
