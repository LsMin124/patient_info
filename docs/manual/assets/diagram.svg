<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 560" role="img" aria-labelledby="diagramTitle diagramDesc" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif">
  <title id="diagramTitle">patientInfo 시스템 구성 다이어그램</title>
  <desc id="diagramDesc">측정 디바이스/Flutter 앱과 의료진의 웹 브라우저가 Spring Boot 백엔드를 거쳐 데이터베이스에 접근하는 흐름.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#0f766e"/>
    </marker>
    <style>
      .box { fill: #ffffff; stroke: #0f766e; stroke-width: 2; rx: 10; }
      .box-ext { fill: #f4f4f1; stroke: #595959; stroke-width: 1.5; stroke-dasharray: 4 3; rx: 10; }
      .box-db { fill: #ccfbf1; stroke: #0f766e; stroke-width: 2; rx: 10; }
      .label { font-size: 15px; font-weight: 600; fill: #1a1a1a; }
      .sub { font-size: 12px; fill: #595959; }
      .arrow { stroke: #0f766e; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .arrow-label { font-size: 11px; fill: #0f766e; font-weight: 600; }
      .lane { font-size: 11px; fill: #b8b8b3; text-transform: uppercase; letter-spacing: 0.08em; }
      .group-bg { fill: #fafaf9; stroke: #e5e5e2; stroke-width: 1; rx: 12; }
    </style>
  </defs>

  <text x="20" y="30" class="lane">Clients (외부)</text>
  <rect class="group-bg" x="20" y="40" width="240" height="500"/>

  <rect class="box-ext" x="50" y="80" width="180" height="80"/>
  <text class="label" x="140" y="115" text-anchor="middle">측정 디바이스</text>
  <text class="sub" x="140" y="135" text-anchor="middle">근력 측정 하드웨어</text>
  <text class="sub" x="140" y="150" text-anchor="middle">+ Flutter 앱</text>

  <rect class="box-ext" x="50" y="220" width="180" height="80"/>
  <text class="label" x="140" y="255" text-anchor="middle">의료진 브라우저</text>
  <text class="sub" x="140" y="275" text-anchor="middle">Chrome / Edge</text>
  <text class="sub" x="140" y="290" text-anchor="middle">대시보드 화면</text>

  <rect class="box-ext" x="50" y="360" width="180" height="80"/>
  <text class="label" x="140" y="395" text-anchor="middle">CI / GitHub</text>
  <text class="sub" x="140" y="415" text-anchor="middle">push 시 자동 빌드</text>
  <text class="sub" x="140" y="430" text-anchor="middle">→ Fly.io 데모 배포</text>

  <text x="290" y="30" class="lane">Server (이 저장소)</text>
  <rect class="group-bg" x="290" y="40" width="380" height="500"/>

  <rect class="box" x="320" y="80" width="320" height="80"/>
  <text class="label" x="480" y="115" text-anchor="middle">React SPA (frontend/)</text>
  <text class="sub" x="480" y="135" text-anchor="middle">TypeScript · Vite · TanStack Query</text>
  <text class="sub" x="480" y="150" text-anchor="middle">→ 빌드 후 static/에 패키징</text>

  <rect class="box" x="320" y="200" width="320" height="60"/>
  <text class="label" x="480" y="225" text-anchor="middle">Controller 계층</text>
  <text class="sub" x="480" y="245" text-anchor="middle">MeasurementController.java · /api/v1/**</text>

  <rect class="box" x="320" y="290" width="320" height="60"/>
  <text class="label" x="480" y="315" text-anchor="middle">Service 계층</text>
  <text class="sub" x="480" y="335" text-anchor="middle">MeasurementService.java · 비즈니스 로직 + 트랜잭션</text>

  <rect class="box" x="320" y="380" width="320" height="60"/>
  <text class="label" x="480" y="405" text-anchor="middle">Repository 계층</text>
  <text class="sub" x="480" y="425" text-anchor="middle">JpaRepository · 3개 (Patient / Measurement / DataPoint)</text>

  <rect class="box" x="320" y="470" width="320" height="50" stroke-dasharray="4 3"/>
  <text class="label" x="480" y="492" text-anchor="middle">GlobalExceptionHandler</text>
  <text class="sub" x="480" y="510" text-anchor="middle">모든 4xx/5xx 응답을 sanitized envelope로 통일</text>

  <text x="700" y="30" class="lane">Storage</text>
  <rect class="group-bg" x="700" y="40" width="160" height="500"/>

  <rect class="box-db" x="720" y="220" width="120" height="120"/>
  <text class="label" x="780" y="270" text-anchor="middle">MariaDB</text>
  <text class="sub" x="780" y="290" text-anchor="middle">(또는 PostgreSQL)</text>
  <text class="sub" x="780" y="310" text-anchor="middle">patients</text>
  <text class="sub" x="780" y="325" text-anchor="middle">measurements</text>
  <text class="sub" x="780" y="340" text-anchor="middle">data_points</text>

  <path class="arrow" d="M 230 120 Q 280 120 320 220"/>
  <text class="arrow-label" x="245" y="180" transform="rotate(45 245 180)">측정값 POST</text>

  <path class="arrow" d="M 230 260 Q 280 200 320 130"/>
  <text class="arrow-label" x="245" y="220" transform="rotate(-30 245 220)">HTML 요청</text>

  <path class="arrow" d="M 230 260 L 320 230"/>
  <text class="arrow-label" x="245" y="245">JSON API 호출</text>

  <path class="arrow" d="M 480 260 L 480 285"/>
  <path class="arrow" d="M 480 350 L 480 375"/>

  <path class="arrow" d="M 640 410 L 720 290"/>
  <text class="arrow-label" x="660" y="350" transform="rotate(-50 660 350)">JPA / SQL</text>

  <path class="arrow" d="M 230 400 Q 280 460 480 520"/>
  <text class="arrow-label" x="270" y="460">deploy</text>
</svg>
