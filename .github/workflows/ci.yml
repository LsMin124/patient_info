name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel an in-flight run when the same branch gets a new push.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (tsc / lint / format / test / build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Enable corepack + pin pnpm 9.15.9
        run: |
          corepack enable
          corepack prepare pnpm@9.15.9 --activate
          pnpm --version

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies (frozen)
        run: pnpm install --frozen-lockfile

      - name: tsc
        run: pnpm tsc

      - name: lint
        run: pnpm lint

      - name: format check
        run: pnpm exec prettier --check .

      - name: test
        run: pnpm test

      - name: build
        run: pnpm build

  backend:
    name: Backend (gradle build — fail-fast envs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      # NOTE: we deliberately do NOT export DB_URL / DB_USERNAME / DB_PASSWORD.
      # The `test` profile uses h2 (set by @ActiveProfiles("test")) and is the
      # only thing CI runs. If the no-fallback contract from Phase 7 T30 ever
      # regresses, gradle :test would silently pass against a stale literal —
      # by leaving env vars unset here we keep the regression visible.
      - name: Gradle build
        run: ./gradlew build --no-daemon
        env:
          # Frontend tasks under build.gradle are skipped — the dedicated
          # frontend job above is the source of truth for SPA gates.
          ORG_GRADLE_PROJECT_skipFrontend: "true"

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: |
            build/reports/tests/test/
            build/test-results/test/
          retention-days: 7

  deploy:
    name: Deploy to Fly.io (demo)
    # Only deploy on main push, never on PRs (which run against forks).
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [frontend, backend]
    runs-on: ubuntu-latest
    # Single in-flight deploy at a time per app — flyctl serializes anyway,
    # but this prevents two GitHub runs from racing on the same release tag.
    concurrency:
      group: fly-deploy-patient-info-demo
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        run: flyctl deploy --remote-only --wait-timeout 300
        env:
          # Required GitHub Secret. Create with:
          #   fly tokens create deploy --app patient-info-demo --expiry 8760h
          # then add to repo Settings → Secrets and variables → Actions.
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
