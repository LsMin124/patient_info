# Fly.io deployment config for the patientInfo demo.
# See docs/RUNBOOK.html §9 for first-time setup steps (fly launch / postgres attach
# / fly secrets set / GitHub Actions FLY_API_TOKEN).
#
# Demo profile only — see WEB_REBUILD_PLAN §3 + IMPL_SPEC §8.11 for the trust
# model. Real PII must not be loaded into this deployment.

# Application name reserved by `fly apps create patient-info-demo`. If you
# pick a different name during `fly launch`, replace this string and update
# CORS_ALLOWED_ORIGINS / README accordingly.
app = "patient-info-demo"
primary_region = "nrt"  # Tokyo — closest Fly region to Korea.
kill_signal = "SIGINT"
kill_timeout = "10s"

[build]
  dockerfile = "Dockerfile"

[env]
  # JVM defaults; tighter heap selection lives in Dockerfile JAVA_TOOL_OPTIONS.
  SERVER_PORT = "8080"
  # Production profile (= no profile activation). The dev profile retains the
  # legacy MariaDB fallback and must NEVER be activated on Fly.
  SPRING_PROFILES_ACTIVE = ""

[http_service]
  internal_port = 8080
  force_https = true
  # Cost guardrail: machine sleeps after a few minutes idle, wakes on request.
  # First request after sleep gets a ~5s cold start — acceptable for demo use.
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    # Health endpoint = GET /api/v1/patients. Returns 200 with the seeded
    # patient list (or [] if the DB is empty), so we don't need an /actuator
    # dependency. The check runs after a 60s grace so Hibernate ddl-auto has
    # time to materialize the schema on a fresh Fly Postgres volume.
    grace_period = "60s"
    interval = "30s"
    method = "GET"
    timeout = "10s"
    path = "/api/v1/patients"

[[vm]]
  # 1 vCPU / 1 GB RAM. Spring Boot at idle uses ~250 MB; 512 MB is too tight
  # with Hibernate + Tomcat overhead. 1 GB is the smallest reliable size on
  # Fly's shared-cpu plans and still ~$2/mo when auto-stopped most of the time.
  size = "shared-cpu-1x"
  memory = "1gb"
